<!DOCTYPE html>
<html>

<head>
    <title>Edit Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Edit Attendance</h2>

<form action="/update_attendance" method="POST">

    <input type="hidden"
           name="id"
           value="{{ attendance[0] }}">

    <div class="mb-3">
        <label>Date</label>
        <input type="text"
               class="form-control"
               value="{{ attendance[1] }}"
               readonly>
    </div>

    <div class="mb-3">
        <label>Roll No</label>
        <input type="text"
               class="form-control"
               value="{{ attendance[2] }}"
               readonly>
    </div>

    <div class="mb-3">
        <label>Name</label>
        <input type="text"
               class="form-control"
               value="{{ attendance[3] }}"
               readonly>
    </div>

    <div class="mb-3">

        <label>Status</label>

        <select name="status" class="form-control">

            <option value="Present"
            {% if attendance[4] == "Present" %}selected{% endif %}>
                Present
            </option>

            <option value="Absent"
            {% if attendance[4] == "Absent" %}selected{% endif %}>
                Absent
            </option>

        </select>

    </div>

    <button class="btn btn-success">
        Update Attendance
    </button>

</form>

</body>

</html>
