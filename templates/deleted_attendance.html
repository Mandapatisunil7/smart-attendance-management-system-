{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">
    🗑️ Recycle Bin
</h2>

<div class="card shadow">

    <div class="card-body">

        <div class="table-responsive">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>Date</th>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                {% for a in attendance %}

                <tr>

                    <td>{{ a[1] }}</td>

                    <td>{{ a[2] }}</td>

                    <td>{{ a[3] }}</td>

                    <td>

                        {% if a[4] == "Present" %}

                        <span class="badge bg-success">
                            Present
                        </span>

                        {% else %}

                        <span class="badge bg-danger">
                            Absent
                        </span>

                        {% endif %}

                    </td>

                    <td>

                        <a href="/restore_attendance/{{ a[0] }}"
                           class="btn btn-success btn-sm">

                            ♻ Restore

                        </a>

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
