{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">
    📝 Mark Attendance
</h2>

<div class="card shadow">

    <div class="card-body">

        <form action="/save_attendance" method="POST">

            <div class="row mb-4">

                <div class="col-md-4">

                    <label class="form-label">
                        Subject
                    </label>

                    <input
                        type="text"
                        name="subject"
                        class="form-control"
                        placeholder="Enter Subject Name"
                        required>

                </div>

            </div>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>Present</th>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Year</th>
                        <th>Section</th>

                    </tr>

                </thead>

                <tbody>

                {% for student in students %}

                    <tr>

                        <td>

                            <input
                                type="hidden"
                                name="student_id"
                                value="{{ student[0] }}">

                            <select
                                name="status_{{ student[0] }}"
                                class="form-select">

                                <option value="Present">
                                    Present
                                </option>

                                <option value="Absent">
                                    Absent
                                </option>

                            </select>

                        </td>

                        <td>{{ student[1] }}</td>
                        <td>{{ student[2] }}</td>
                        <td>{{ student[3] }}</td>
                        <td>{{ student[4] }}</td>
                        <td>{{ student[5] }}</td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

            <button class="btn btn-success">

                Save Attendance

            </button>

        </form>

    </div>

</div>

{% endblock %}
